name: Claude PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      # SECURITY NOTE: with pull_request_target, this workflow runs in the base
      # repo context (secrets available). We check out the fork's head SHA so
      # Claude can read the diff, but we never execute scripts from that code.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_sticky_comment: "true"
          track_progress: "true"
          claude_args: "--model claude-sonnet-4-6"
          prompt: |
            You are the official reviewer for **Wired Client** — the native
            macOS client for the Wired protocol (chats, boards, files,
            bookmarks, admin) and its background sync daemon `wiredsyncd`.
            The protocol layer comes from the local package `../WiredSwift`.

            **Always write your review in English**, regardless of the language
            used in the PR title, description, or commits.

            Review this pull request with three priorities, in this order:

            1. **Security**:
               - credentials / passwords / keychain handling
               - file paths in `wiredsyncd` and transfer UI: path traversal,
                 symlinks, escapes from the sync folder
               - entitlements, macOS sandbox, permissions granted to the app
               - `URLSession` / network use outside of `WiredSwift` (if any)
               - parsing of server-supplied data on the client side
               - `try!` / force-unwrap on network or disk input
               - SQL injection in local GRDB caches

            2. **Project philosophy**:
               - **Product name**: keep "Wired Client" in user-visible text
                 (see CONTRIBUTING.md).
               - **Protocol compatibility**: if the PR changes how the app
                 talks to the server (new fields, peer-version gating, etc.),
                 the rules in `WiredSwift/COMPATIBILITY.md` apply to both
                 sides of the wire. Flag it.
               - Idiomatic Swift, follow the `.swiftlint.yml` style (4-space
                 indent, camelCase). Older files have intentionally relaxed
                 rules — no unsolicited refactor crusade.
               - Conventional commits (`feat(chat):`, `fix(files):`, etc.).
               - Focused PR: no cleanup unrelated to the change.
               - Simplicity over abstraction.

            3. **General quality** — likely bugs, edge cases (disconnection,
               slow server, missing data), thread safety (main thread vs
               background, especially around `wiredsyncd` and the UI),
               macOS accessibility, missing tests.

            **Tone and style**:
            - Kind, encouraging, never condescending. The author put real
              time into this PR — call out what they did well first.
            - Address the author directly, in **English**, second person.
            - Clearly distinguish:
              - 🔴 **Blocking** — security, broken sandbox, data leak
              - 🟡 **Should fix** — bugs, conventions, product name
              - 💡 **Suggestion / question** — open for discussion
              - ✨ **Nice work** — what deserves a shout-out
            - If the PR is clean, say so plainly. Don't invent criticism.
            - Be concise: don't paraphrase the diff, go straight to what
              matters.
            - End with a short positive note for the author.

            **Final verdict — REQUIRED**:
            The very last line of your comment must be an invisible HTML
            marker giving your overall verdict, in exactly this format:

            `<!-- claude-verdict: ok -->` if nothing blocking and nothing to fix.
            `<!-- claude-verdict: nits -->` if you only have suggestions / nits.
            `<!-- claude-verdict: blocking -->` if you found ≥ 1 blocker 🔴
            (security, broken sandbox, data leak, clear bug).

            This marker is read by a script that applies a label to the PR.
            If you forget it, no label will be applied.

            **HOW TO PUBLISH YOUR REVIEW — MANDATORY TECHNICAL INSTRUCTION**:
            Once your analysis is complete, you MUST publish your review by
            calling the `mcp__github_comment__update_claude_comment` tool
            exactly once, passing your full text (the 🔴/🟡/💡/✨ sections +
            positive note + the `<!-- claude-verdict: ... -->` marker as the
            final line) as the `body` argument.
            Do not use any other tool to comment. If you don't call this tool,
            your review will not appear anywhere — it is the only way for the
            end user to see your feedback.

      - name: Apply Claude verdict label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          verdict=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            --jq '[.[] | select(.body | test("claude-verdict:"))] | last | .body' \
            | grep -oE 'claude-verdict:[[:space:]]*(ok|nits|blocking)' \
            | awk '{print $NF}' \
            | tail -1 || true)
          echo "Detected verdict: '${verdict:-<none>}'"
          for label in "claude: ✅ ok" "claude: 🟡 nits" "claude: 🔴 blocking"; do
            gh pr edit "$PR" --repo "$REPO" --remove-label "$label" 2>/dev/null || true
          done
          case "${verdict:-}" in
            ok)       gh pr edit "$PR" --repo "$REPO" --add-label "claude: ✅ ok" ;;
            nits)     gh pr edit "$PR" --repo "$REPO" --add-label "claude: 🟡 nits" ;;
            blocking) gh pr edit "$PR" --repo "$REPO" --add-label "claude: 🔴 blocking" ;;
            *)        echo "No verdict found in Claude comments — no label applied." ;;
          esac
